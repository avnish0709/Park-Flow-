<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mall Park 360 — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0A0C12;
    --surface:  #12151E;
    --border:   #1E2230;
    --gold:     #FFB800;
    --gold2:    #FF8C00;
    --teal:     #00C9A7;
    --red:      #FF4455;
    --text:     #E8EAF0;
    --muted:    #6B7280;
    --input-bg: #0D0F18;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
  /* Background grid lines */
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(255,184,0,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,184,0,.03) 1px,transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
  }
  /* Glow orbs */
  .orb{
    position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;
  }
  .orb1{width:600px;height:600px;background:rgba(255,184,0,.05);top:-200px;left:-200px;}
  .orb2{width:400px;height:400px;background:rgba(0,201,167,.04);bottom:-100px;right:-100px;}

  /* Top brand bar */
  .brand-bar{
    position:fixed;top:0;left:0;right:0;
    display:flex;align-items:center;justify-content:center;
    padding:20px 0 16px;
    border-bottom:1px solid var(--border);
    background:rgba(10,12,18,.9);
    backdrop-filter:blur(12px);
    z-index:100;
  }
  .brand-bar .logo-icon{
    width:34px;height:34px;
    background:var(--gold);
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    margin-right:12px;
    font-family:'Rajdhani',sans-serif;
    font-weight:700;font-size:18px;
    color:#000;flex-shrink:0;
  }
  .brand-bar .brand-name{
    font-family:'Rajdhani',sans-serif;
    font-size:22px;font-weight:700;
    letter-spacing:2px;
    color:var(--text);
    text-transform:uppercase;
  }
  .brand-bar .brand-name span{color:var(--gold);}

  /* Card */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:44px 40px 40px;
    width:100%;max-width:420px;
    position:relative;
    box-shadow:0 24px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,184,0,.06);
    animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn{
    from{opacity:0;transform:translateY(24px) scale(.97)}
    to{opacity:1;transform:none}
  }
  .card-header{
    text-align:center;
    margin-bottom:32px;
  }
  .card-header .park-icon{
    width:60px;height:60px;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;
    font-size:28px;
    box-shadow:0 8px 24px rgba(255,184,0,.3);
  }
  .card-header h1{
    font-family:'Rajdhani',sans-serif;
    font-size:26px;font-weight:700;
    letter-spacing:1px;
    color:var(--text);
  }
  .card-header p{
    font-size:14px;color:var(--muted);
    margin-top:6px;
  }

  /* Form */
  .form-group{margin-bottom:20px;}
  .form-group label{
    display:block;
    font-size:12px;font-weight:600;
    letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px;
  }
  .form-group input{
    width:100%;
    background:var(--input-bg);
    border:1.5px solid var(--border);
    border-radius:10px;
    padding:13px 16px;
    font-family:'DM Sans',sans-serif;
    font-size:15px;color:var(--text);
    outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  .form-group input:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(255,184,0,.12);
  }
  .form-group input::placeholder{color:var(--muted);}

  .btn-login{
    width:100%;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    border:none;border-radius:10px;
    padding:14px;
    font-family:'Rajdhani',sans-serif;
    font-size:17px;font-weight:700;
    letter-spacing:1.5px;
    color:#000;text-transform:uppercase;
    cursor:pointer;
    margin-top:8px;
    transition:opacity .2s,transform .15s,box-shadow .2s;
    box-shadow:0 4px 20px rgba(255,184,0,.25);
  }
  .btn-login:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 8px 28px rgba(255,184,0,.35);}
  .btn-login:active{transform:translateY(0);}
  .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .error-msg{
    background:rgba(255,68,85,.1);
    border:1px solid rgba(255,68,85,.3);
    border-radius:8px;
    padding:11px 14px;
    font-size:14px;color:var(--red);
    margin-bottom:20px;
    display:none;
  }
  .error-msg.show{display:block;}

  /* Role badges at bottom */
  .roles-hint{
    margin-top:28px;
    border-top:1px solid var(--border);
    padding-top:20px;
    display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  }
  .role-badge{
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    font-weight:600;
    letter-spacing:.5px;
    text-transform:uppercase;
  }
  .rb-supervisor{background:rgba(255,184,0,.12);color:var(--gold);}
  .rb-officer{background:rgba(0,201,167,.12);color:var(--teal);}
  .rb-attendant{background:rgba(120,130,255,.12);color:#9AA0FF;}

  .spinner{
    display:inline-block;width:16px;height:16px;
    border:2px solid rgba(0,0,0,.3);
    border-top-color:#000;
    border-radius:50%;
    animation:spin .6s linear infinite;
    margin-right:8px;vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav class="brand-bar">
  <div class="logo-icon">🅿</div>
  <div class="brand-name">Mall <span>Park 360</span></div>
</nav>

<div class="card">
  <div class="card-header">
    <div class="park-icon">🚗</div>
    <h1>Welcome Back</h1>
    <p>Sign in to your account to continue</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="roles-hint">
    <span class="role-badge rb-supervisor">Supervisor</span>
    <span class="role-badge rb-officer">Officer</span>
    <span class="role-badge rb-attendant">Attendant</span>
  </div>
</div>

<script>
  // Auto-redirect if already logged in
  const tok = localStorage.getItem('mp360_token');
  const role = localStorage.getItem('mp360_role');
  if(tok && role) redirectByRole(role);

  document.getElementById('password').addEventListener('keydown', e => {
    if(e.key === 'Enter') doLogin();
  });

  async function doLogin(){
    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('password').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('errorMsg');

    if(!email || !pwd){
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    err.classList.remove('show');

    try{
      const res = await fetch('/api/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password:pwd})
      });
      const data = await res.json();
      if(!res.ok){
        showError(data.error || 'Login failed. Please check your credentials.');
        btn.disabled=false;
        btn.textContent='Sign In';
        return;
      }
      localStorage.setItem('mp360_token', data.token);
      localStorage.setItem('mp360_role',  data.role);
      localStorage.setItem('mp360_name',  data.name);
      redirectByRole(data.role);
    }catch(e){
      showError('Connection error. Make sure the server is running.');
      btn.disabled=false;
      btn.textContent='Sign In';
    }
  }

  function redirectByRole(role){
    const map = {supervisor:'/supervisor', officer:'/officer', attendant:'/attendant'};
    window.location.href = map[role] || '/';
  }

  function showError(msg){
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
